<!DOCTYPE html>
<html>
<body>

<h1>新しいパスワード設定</h1>

<form action="/reset-password" method="post">
    <input type="hidden" name="email" value="{{ email }}">

    <p>新しいパスワード</p>
    <input type="password" name="new_password" required>

    <br><br>

    <button type="submit">変更する</button>
</form>

</body>
</html>
