<!DOCTYPE html>
<html>
<head>
    <title>イベント編集</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
    body {
        font-family: Arial, sans-serif;
        background:linear-gradient(
            135deg,
            #eaf4ff,
            #edfdf5
        );
        min-height: 100vh;
        margin: 0;
        padding: 16px;
    }

    .edit-event-box {
        max-width: 480px;
        margin: 20px auto;
        background: white;
        padding: 22px;
        border-radius: 16px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    input,
    textarea,
    select {
        width: 100%;
        box-sizing: border-box;
        padding: 12px;
        margin-bottom: 14px;
        border: 1px solid #ccc;
        border-radius: 8px;
    }

    textarea {
        min-height: 100px;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #3498db;
        color: white;
        font-size: 16px;
    }
</style>
<body>

<div class="edit-event-box">
<h1>イベント編集</h1>

<form action="/edit_event/{{ event[0] }}?user_id={{ user_id }}" method="post">

    <p>イベント種類</p>
    <select name="title">
        <option value="ES締切" {% if event[2] == "ES締切" %}selected{% endif %}>ES締切</option>
        <option value="Webテスト締切" {% if event[2] == "Webテスト締切" %}selected{% endif %}>Webテスト締切</option>
        <option value="説明会" {% if event[2] == "説明会" %}selected{% endif %}>説明会</option>
        <option value="一次面接" {% if event[2] == "一次面接" %}selected{% endif %}>一次面接</option>
        <option value="二次面接" {% if event[2] == "二次面接" %}selected{% endif %}>二次面接</option>
        <option value="最終面接" {% if event[2] == "最終面接" %}selected{% endif %}>最終面接</option>
        <option value="インターン" {% if event[2] == "インターン" %}selected{% endif %}>インターン</option>
        <option value="オープンカンパニー" {% if event[2] == "オープンカンパニー" %}selected{% endif %}>オープンカンパニー</option>
        <option value="その他" {% if event[2] == "その他" %}selected{% endif %}>その他</option>
    </select>


        

    <p>開催日</p>
    <input type="date" name="start_date" value="{{ event[3][:10] }}">

    <p>開催時間</p>
    <input type="time" name="start_time" value="{{ event[3][11:16] }}">


    <p>終了日時</p>
    <input type="date" name="end_date" value="{{ event[4][:10] }}">

    <p>終了時間</p>
    <input type="time" name="end_time" value="{{ event[4][11:16] }}">


    <p>場所</p>
    <input type="text" name="location" value="{{ event[5] }}">

    <p>メモ</p>
    <textarea name="memo">{{ event[6] }}</textarea>

    <br><br>
    <button type="submit">保存</button>

</form>

<a href="/calendar?user_id={{ user_id }}">カレンダーに戻る</a>

</div>
</body>
</html>
