<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ログイン</title>

<style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(
                135deg,
                #dbeafe,
                #c7f9cc
            );
            min-height: 100vh;
            margin: 0;
            padding: 20px;
             
        }

        .login-box {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.0.12);
        }

       
        
        
        .subtitle{
            text-align: center;
            color:#666;
            margin-bottom:15px;
        }
        h1 {
            text-align: center;
            font-size: 40px;
            font-weight: 600;
            margin: 0 0 10px;
            color: #475569;
            letter-spacing: 3px;
        }

        p{
            font-weight: bpld;
            font-size: 16px;
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            box-sizing: border-box;
            border:1px solid #e5e7eb;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 15px;
            background: #4eb84a;
            color: white;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
        }

        .circle1{
            position: fixed;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);

            top: -50px;
            left: -50px;
        }

        .circle2{
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);

            bottom: -100px;
            right: -100px;
        }

        a{
            display: block;
            margin-top: 18px;
            color: #1266ff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
        }
        
    
</style>


</head>

<body>

    <div class="circle1"></div>
    <div class="cicle2"></div>
    <div class="login-box">
        <h1>ログイン</h1>
        <p class="subtitle">就活をもっとスマートに</p>
        <form action="/login" method="post">

            <p>ユーザー名</p>
            <input type="text" name="username">

            <p>パスワード</p>
            <input type="password" id="password" name="password">

            <label>
               <input type="checkbox" onclick="togglePassword()">
                パスワードを表示
            </label>

            

            {% if error %}
            <p style="color:red;">{{ error }}</p>"
            {% endif %}

            <button type="submit">ログイン</button>

        </form>

        <br>

        <a href="/register">新規登録はこちら</a>
        <br><br>

        <a href="/forgot-password">
            パスワードを忘れた方はこちら
        </a>

    </div>
            <script>
            function togglePassword() {
                 var passwordField = document.getElementById("password");
                 if (passwordField.type === "password") {
                    passwordField.type = "text";
                } else {
                    passwordField.type = "password";
                }
            }
            </script>
</body>

</html>
