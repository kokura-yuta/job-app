<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ログイン</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(
                135deg,
                #dbeafe,
                #c7f9cc
            );
            min-height: 100vh;
            margin: 0;
            padding: 20px;
             
        }

        .login-box {
            max-width: 400px;
            margin: 50px auto;

            background: white;
            padding: 25px;

            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logo{
            font-size:60px;
            text-align:center;
            margin-bottom:25px;
        }
        
        .subtitle{
            text-align: center;
            color:#666;
            margin-bottom:25px;
        }
        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            background: #56af4c;
            color: white;
            cursor: pointer;
        }

        .circle1{
            position: fixed;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);

            top: -50px;
            left: -50px;
        }

        .circle2{
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);

            bottom: -100px;
            right: -100px;
        }

    </style>

</head>

<body>

    <div class="circle1"></div>
    <div class="cicle2"></div>
    <div class="login-box">
        <div class="logo">💼</div>
        <h1>ログイン</h1>
        <p class="subtitle">就活をもっとスマートに</p>
        <form action="/login" method="post">

            <p>ユーザー名</p>
            <input type="text" name="username">

            <p>パスワード</p>
            <input type="password" id="password" name="password">

            <label>
               <input type="checkbox" onclick="togglePassword()">
                パスワードを表示
            </label>

            

            {% if error %}
            <p style="color:red;">{{ error }}</p>"
            {% endif %}

            <button type="submit">ログイン</button>

        </form>

        <br>

        <a href="/register">新規登録はこちら</a>
        <br><br>

        <a href="/forgot-password">
            パスワードを忘れた方はこちら
        </a>

    </div>
            <script>
            function togglePassword() {
                 var passwordField = document.getElementById("password");
                 if (passwordField.type === "password") {
                    passwordField.type = "text";
                } else {
                    passwordField.type = "password";
                }
            }
            </script>
</body>

</html>
